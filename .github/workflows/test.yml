name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BRIDGEBOT_CLAUDE_URL: http://localhost:8585
          BRIDGEBOT_CLAUDE_KEY: test
          BRIDGEBOT_GEMINI_URL: http://localhost:8586
          BRIDGEBOT_GEMINI_KEY: test
          BRIDGEBOT_CODEX_URL: http://localhost:8587
          BRIDGEBOT_CODEX_KEY: test
          BRIDGEBOT_QWEN_URL: http://localhost:8588
          BRIDGEBOT_QWEN_KEY: test
          BRIDGEBOT_FREE_URL: http://localhost:8590
          BRIDGEBOT_FREE_KEY: test
          NEXT_PUBLIC_SERVER_PRECONFIGURED: "false"
